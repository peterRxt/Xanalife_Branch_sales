<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.5" />
    <title>XanaLife Branch Sales</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
    </script>
    <!-- SheetJS (XLSX export) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js">
    </script>
    <style>
        body {
            background: #f8fafc;
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            transition: transform 0.15s ease;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .card-header {
            background: white;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            font-weight: 600;
            padding: 1rem 1.25rem;
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            opacity: 0.6;
        }
        .table thead th {
            background: #1e293b;
            color: white;
            font-weight: 500;
            border: none;
            white-space: nowrap;
        }
        .table tbody tr:hover {
            background-color: rgba(30, 41, 59, 0.03);
        }
        .btn-outline-secondary {
            border-color: #dbe0e6;
        }
        .btn-outline-secondary:hover {
            background: #f1f4f8;
            border-color: #c0c8d2;
        }
        .filter-bar {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02);
        }
        h2 {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0b1a2b;
        }
        .text-muted-light {
            color: #6c7a8d;
        }
        #salesTable td {
            vertical-align: middle;
        }
        .chart-container {
            position: relative;
            height: 220px;
        }
        .loading-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 0.25rem solid #e9ecef;
            border-top-color: #1e293b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @media (max-width: 768px) {
            .filter-bar {
                border-radius: 1rem;
                padding: 1rem;
            }
            .stat-card .stat-icon {
                font-size: 1.6rem;
            }
        }
        .demo-badge {
            font-size: 0.7rem;
            background: #f59e0b;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        .status-badge.loading {
            background: #fef3c7;
            color: #92400e;
        }
        .status-badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        .status-badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container py-4 py-md-5">
        <!-- header -->
        <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
            <div>
                <h2 class="mb-0">
                    <i class="bi bi-bar-chart-fill me-2" style="color:#1e293b;"></i>
                    XanaLife Branch Sales
                    <span class="demo-badge" id="dataModeBadge">DEMO</span>
                </h2>
                <span class="badge bg-light text-secondary mt-1 px-3 py-2" id="statusBadge">
                    <i class="bi bi-circle-fill me-1" style="color:#f59e0b;font-size:0.6rem;"></i>
                    Loading...
                </span>
            </div>
            <div class="d-flex gap-2 mt-2 mt-sm-0">
                <button class="btn btn-outline-secondary rounded-pill px-4" id="exportExcelBtn">
                    <i class="bi bi-file-earmark-excel me-2"></i>Export Excel
                </button>
                <button class="btn btn-outline-secondary rounded-pill px-4" id="refreshBtn">
                    <i class="bi bi-arrow-clockwise me-2"></i>Refresh
                </button>
            </div>
        </div>

        <!-- Filters card -->
        <div class="filter-bar mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Branch</label>
                    <select id="branch" class="form-select form-select-lg rounded-pill border-0 bg-light">
                        <option value="">All Branches</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Start Date</label>
                    <input type="date" id="start" class="form-control form-control-lg rounded-pill border-0 bg-light" />
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">End Date</label>
                    <input type="date" id="end" class="form-control form-control-lg rounded-pill border-0 bg-light" />
                </div>
                <div class="col-md-3 d-grid">
                    <button class="btn btn-dark rounded-pill py-2 fw-semibold" id="searchBtn" style="background:#1e293b; border-color:#1e293b;">
                        <i class="bi bi-search me-2"></i>Apply filters
                    </button>
                </div>
            </div>
        </div>

        <!-- KPI cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted-light small text-uppercase fw-semibold">Total Sales</span>
                            <h3 class="mb-0 fw-bold" id="totalSales">0</h3>
                        </div>
                        <div class="stat-icon text-success"><i class="bi bi-cash-stack"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted-light small text-uppercase fw-semibold">Customers</span>
                            <h3 class="mb-0 fw-bold" id="customers">0</h3>
                        </div>
                        <div class="stat-icon text-primary"><i class="bi bi-people"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted-light small text-uppercase fw-semibold">Basket Value</span>
                            <h3 class="mb-0 fw-bold" id="basketValue">0.00</h3>
                        </div>
                        <div class="stat-icon text-warning"><i class="bi bi-cart-check"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
                        <span>Sales by Branch</span>
                        <span class="badge bg-light text-secondary">top 5</span>
                    </div>
                    <div class="card-body chart-container">
                        <canvas id="branchChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header bg-transparent">Daily Sales Trend</div>
                    <div class="card-body chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
                <span><i class="bi bi-table me-2"></i>Detailed Records</span>
                <span class="badge bg-secondary bg-opacity-10 text-secondary" id="rowCount">0 rows</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="dataTable">
                        <thead>
                            <tr>
                                <th>DATE</th>
                                <th>BRANCH</th>
                                <th>CASH</th>
                                <th>MPESA</th>
                                <th>CREDIT CARD</th>
                                <th>INVOICE</th>
                                <th>TOTAL</th>
                                <th>CUSTOMERS</th>
                                <th>B/VALUE</th>
                            </tr>
                        </thead>
                        <tbody id="salesTable">
                            <tr>
                                <td colspan="9" class="text-center py-4">
                                    <div class="d-flex justify-content-center align-items-center gap-3">
                                        <div class="loading-spinner"></div>
                                        <span class="text-muted">Loading data…</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------------------------------------------------
            //  CONFIG & STATE
            // ------------------------------------------------------------
            const API = "https://script.google.com/macros/s/AKfycbyBZt6KqVPjU7boOunFBEAzHb8pPDLxbg8dizECxyUJMFa5bcElR0UVe1AcWvNpcIxo/exec";
            let cachedData = null;
            let filteredRows = [];
            let usingDemoData = false;
            let dataLoadAttempted = false;

            let branchChartInstance = null;
            let trendChartInstance = null;

            const branchSelect = document.getElementById('branch');
            const startInput = document.getElementById('start');
            const endInput = document.getElementById('end');
            const salesTable = document.getElementById('salesTable');
            const totalSalesEl = document.getElementById('totalSales');
            const customersEl = document.getElementById('customers');
            const basketEl = document.getElementById('basketValue');
            const rowCountEl = document.getElementById('rowCount');
            const exportBtn = document.getElementById('exportExcelBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const statusBadge = document.getElementById('statusBadge');
            const dataModeBadge = document.getElementById('dataModeBadge');

            // ------------------------------------------------------------
            //  DEMO DATA (realistic sample)
            // ------------------------------------------------------------
            function generateDemoData() {
                const branches = ['Nairobi CBD', 'Mombasa', 'Kisumu', 'Nakuru', 'Eldoret', 'Thika', 'Malindi'];
                const data = [];
                const today = new Date();
                for (let i = 90; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const branch = branches[Math.floor(Math.random() * branches.length)];
                    const cash = Math.round((Math.random() * 150000 + 20000) / 100) * 100;
                    const mpesa = Math.round((Math.random() * 200000 + 30000) / 100) * 100;
                    const card = Math.round((Math.random() * 100000 + 10000) / 100) * 100;
                    const invoice = Math.round((Math.random() * 80000 + 5000) / 100) * 100;
                    const total = cash + mpesa + card + invoice;
                    const customers = Math.floor(Math.random() * 80 + 5);
                    data.push([dateStr, branch, cash, mpesa, card, invoice, total, customers]);
                }
                return data;
            }

            // ------------------------------------------------------------
            //  HELPERS
            // ------------------------------------------------------------
            function isHeaderRow(row) {
                if (!row || !Array.isArray(row) || row.length === 0) return false;
                const first = String(row[0] || '').toLowerCase();
                return first.includes('date') || first.includes('branch') || first.includes('total') || first.includes(
                'sales');
            }

            function formatDate(dateValue) {
                if (!dateValue) return '';
                if (typeof dateValue === 'string' && (dateValue.toLowerCase().includes('date') || dateValue.toLowerCase()
                        .includes('total'))) return dateValue;
                let d = new Date(dateValue);
                if (isNaN(d.getTime())) {
                    const m = String(dateValue).match(/(\d{4})-(\d{2})-(\d{2})/);
                    if (m) return `${m[3]}-${m[2]}-${m[1].slice(-2)}`;
                    return String(dateValue);
                }
                const dd = String(d.getDate()).padStart(2, '0');
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const yy = String(d.getFullYear()).slice(-2);
                return `${dd}-${mm}-${yy}`;
            }

            function extractDateString(dateValue) {
                if (!dateValue) return null;
                if (typeof dateValue === 'string' && (dateValue.toLowerCase().includes('date') || dateValue.toLowerCase()
                        .includes('total'))) return null;
                let d = new Date(dateValue);
                if (isNaN(d.getTime())) {
                    const m = String(dateValue).match(/(\d{4})-(\d{2})-(\d{2})/);
                    if (m) return m[0];
                    return null;
                }
                const y = d.getFullYear();
                const mo = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${mo}-${day}`;
            }

            function getUniqueBranches(rows) {
                const set = new Set();
                rows.forEach(row => {
                    const b = row[1] ? String(row[1]).trim() : '';
                    if (b && !b.toLowerCase().includes('branch')) set.add(b);
                });
                return Array.from(set).sort();
            }

            function updateBranchFilter(rows) {
                const current = branchSelect.value;
                const branches = getUniqueBranches(rows);
                branchSelect.innerHTML = '<option value="">All Branches</option>';
                branches.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b;
                    opt.textContent = b;
                    branchSelect.appendChild(opt);
                });
                if (current && branches.includes(current)) branchSelect.value = current;
            }

            function setStatus(type, message) {
                statusBadge.innerHTML = '';
                const icon = document.createElement('i');
                icon.className = 'bi bi-circle-fill me-1';
                icon.style.fontSize = '0.6rem';
                if (type === 'loading') {
                    icon.style.color = '#f59e0b';
                    statusBadge.className = 'badge bg-light text-secondary mt-1 px-3 py-2 status-badge loading';
                    statusBadge.appendChild(icon);
                    statusBadge.appendChild(document.createTextNode(' ' + message));
                } else if (type === 'success') {
                    icon.style.color = '#10b981';
                    statusBadge.className = 'badge bg-light text-secondary mt-1 px-3 py-2 status-badge success';
                    statusBadge.appendChild(icon);
                    statusBadge.appendChild(document.createTextNode(' ' + message));
                } else if (type === 'error') {
                    icon.style.color = '#ef4444';
                    statusBadge.className = 'badge bg-light text-secondary mt-1 px-3 py-2 status-badge error';
                    statusBadge.appendChild(icon);
                    statusBadge.appendChild(document.createTextNode(' ' + message));
                }
            }

            // ------------------------------------------------------------
            //  LOAD & FILTER
            // ------------------------------------------------------------
            async function loadSales(forceRefresh = false) {
                try {
                    setStatus('loading', 'Loading data...');
                    dataModeBadge.textContent = 'LOADING';
                    dataModeBadge.style.background = '#f59e0b';

                    // Show loading state
                    salesTable.innerHTML = `<tr><td colspan="9" class="text-center py-4">
                        <div class="d-flex justify-content-center align-items-center gap-3">
                            <div class="loading-spinner"></div>
                            <span class="text-muted">Loading data…</span>
                        </div>
                    </td></tr>`;

                    // Try to fetch real data
                    let dataLoaded = false;
                    if (!cachedData || forceRefresh) {
                        try {
                            const resp = await fetch(API, {
                                method: 'GET',
                                mode: 'cors',
                                headers: {
                                    'Accept': 'application/json'
                                }
                            });

                            if (resp.ok) {
                                let raw = await resp.json();
                                if (!Array.isArray(raw)) {
                                    if (raw.data && Array.isArray(raw.data)) raw = raw.data;
                                    else if (raw.values && Array.isArray(raw.values)) raw = raw.values;
                                    else throw new Error('Invalid data format');
                                }
                                if (raw && raw.length > 0) {
                                    cachedData = raw;
                                    dataLoaded = true;
                                    usingDemoData = false;
                                    dataModeBadge.textContent = 'LIVE';
                                    dataModeBadge.style.background = '#10b981';
                                    setStatus('success', 'Live data loaded');
                                }
                            }
                        } catch (e) {
                            console.warn('Failed to load live data, using demo:', e);
                        }
                    } else if (cachedData) {
                        dataLoaded = true;
                    }

                    // If no data loaded, use demo data
                    if (!dataLoaded) {
                        if (!cachedData || forceRefresh) {
                            cachedData = generateDemoData();
                        }
                        usingDemoData = true;
                        dataModeBadge.textContent = 'DEMO';
                        dataModeBadge.style.background = '#f59e0b';
                        setStatus('success', 'Demo data (live unavailable)');
                    }

                    let data = cachedData;
                    if (!data || data.length === 0) {
                        renderEmpty('No data available');
                        updateCharts([]);
                        updateKPIs(0, 0, 0);
                        return;
                    }

                    let rows = data;
                    if (rows.length > 0 && isHeaderRow(rows[0])) rows = rows.slice(1);
                    if (rows.length === 0) {
                        renderEmpty('No data rows');
                        updateCharts([]);
                        updateKPIs(0, 0, 0);
                        return;
                    }

                    updateBranchFilter(rows);

                    const branch = branchSelect.value;
                    const start = startInput.value;
                    const end = endInput.value;

                    let filtered = rows;
                    if (branch) {
                        filtered = filtered.filter(r => String(r[1] || '').trim() === branch);
                    }
                    if (start || end) {
                        filtered = filtered.filter(r => {
                            const ds = extractDateString(r[0]);
                            if (!ds) return true;
                            if (start && ds < start) return false;
                            if (end && ds > end) return false;
                            return true;
                        });
                    }

                    filteredRows = filtered;

                    if (filtered.length === 0) {
                        renderEmpty('No data matches your filters');
                        updateCharts([]);
                        updateKPIs(0, 0, 0);
                        return;
                    }

                    let html = '';
                    let totalSales = 0,
                        totalCustomers = 0;
                    filtered.forEach(row => {
                        const dateF = formatDate(row[0]);
                        const cash = Number(row[2] || 0);
                        const mpesa = Number(row[3] || 0);
                        const card = Number(row[4] || 0);
                        const invoice = Number(row[5] || 0);
                        const total = Number(row[6] || 0);
                        const customers = Number(row[7] || 0);
                        const bval = customers > 0 ? (total / customers) : 0;
                        totalSales += total;
                        totalCustomers += customers;

                        html += `<tr>
                            <td>${dateF}</td>
                            <td>${row[1] || ''}</td>
                            <td>${cash.toLocaleString()}</td>
                            <td>${mpesa.toLocaleString()}</td>
                            <td>${card.toLocaleString()}</td>
                            <td>${invoice.toLocaleString()}</td>
                            <td><strong>${total.toLocaleString()}</strong></td>
                            <td>${customers}</td>
                            <td>${bval.toFixed(2)}</td>
                        </tr>`;
                    });

                    salesTable.innerHTML = html;
                    rowCountEl.textContent = `${filtered.length} rows`;

                    const basket = totalCustomers > 0 ? (totalSales / totalCustomers) : 0;
                    updateKPIs(totalSales, totalCustomers, basket);
                    updateCharts(filtered);

                    dataLoadAttempted = true;

                } catch (err) {
                    console.error('Load error:', err);
                    setStatus('error', 'Error loading data');
                    // Fallback to demo if not already using it
                    if (!usingDemoData) {
                        cachedData = generateDemoData();
                        usingDemoData = true;
                        dataModeBadge.textContent = 'DEMO';
                        dataModeBadge.style.background = '#f59e0b';
                        setStatus('success', 'Demo data (error recovery)');
                        loadSales(false);
                        return;
                    }
                    renderEmpty('Error loading data. Please check connection.');
                    updateCharts([]);
                    updateKPIs(0, 0, 0);
                }
            }

            function renderEmpty(msg) {
                salesTable.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">${msg}</td></tr>`;
                rowCountEl.textContent = '0 rows';
            }

            function updateKPIs(total, customers, basket) {
                totalSalesEl.textContent = total.toLocaleString();
                customersEl.textContent = customers;
                basketEl.textContent = basket.toFixed(2);
            }

            // ------------------------------------------------------------
            //  CHARTS
            // ------------------------------------------------------------
            function updateCharts(rows) {
                if (!rows || rows.length === 0) {
                    if (branchChartInstance) { branchChartInstance.destroy();
                        branchChartInstance = null; }
                    if (trendChartInstance) { trendChartInstance.destroy();
                        trendChartInstance = null; }
                    return;
                }

                // Branch chart
                const branchMap = new Map();
                rows.forEach(r => {
                    const branch = String(r[1] || 'Unknown').trim();
                    const total = Number(r[6] || 0);
                    branchMap.set(branch, (branchMap.get(branch) || 0) + total);
                });
                const sorted = Array.from(branchMap.entries()).sort((a, b) => b[1] - a[1]);
                const labels = sorted.map(e => e[0]);
                const values = sorted.map(e => e[1]);

                const ctx1 = document.getElementById('branchChart').getContext('2d');
                if (branchChartInstance) branchChartInstance.destroy();
                branchChartInstance = new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: labels.length ? labels : ['No data'],
                        datasets: [{
                            label: 'Total Sales',
                            data: values.length ? values : [0],
                            backgroundColor: ['#3b82f6', '#8b5cf6', '#06b6d4', '#f59e0b', '#ef4444', '#10b981'],
                            borderRadius: 6,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' } } }
                    }
                });

                // Trend chart
                const dateMap = new Map();
                rows.forEach(r => {
                    const ds = extractDateString(r[0]);
                    if (!ds) return;
                    const total = Number(r[6] || 0);
                    dateMap.set(ds, (dateMap.get(ds) || 0) + total);
                });
                const sortedDates = Array.from(dateMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                const dateLabels = sortedDates.map(e => {
                    const parts = e[0].split('-');
                    return `${parts[2]}/${parts[1]}`;
                });
                const dateValues = sortedDates.map(e => e[1]);

                const ctx2 = document.getElementById('trendChart').getContext('2d');
                if (trendChartInstance) trendChartInstance.destroy();
                trendChartInstance = new Chart(ctx2, {
                    type: 'line',
                    data: {
                        labels: dateLabels.length ? dateLabels : ['No data'],
                        datasets: [{
                            label: 'Daily Sales',
                            data: dateValues.length ? dateValues : [0],
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37,99,235,0.08)',
                            fill: true,
                            tension: 0.2,
                            pointRadius: 3,
                            pointBackgroundColor: '#2563eb',
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' } } }
                    }
                });
            }

            // ------------------------------------------------------------
            //  EXPORT EXCEL
            // ------------------------------------------------------------
            function exportToExcel() {
                if (!filteredRows || filteredRows.length === 0) {
                    alert('No data to export. Please apply filters to show records.');
                    return;
                }
                const header = ['DATE', 'BRANCH', 'CASH SALES', 'MPESA SALES', 'CREDIT CARD SALES', 'INVOICE SALES',
                    'TOTAL SALES', 'CUSTOMERS', 'B/VALUE'
                ];
                const rows = filteredRows.map(r => {
                    const total = Number(r[6] || 0);
                    const customers = Number(r[7] || 0);
                    const bval = customers > 0 ? (total / customers) : 0;
                    return [
                        formatDate(r[0]),
                        String(r[1] || ''),
                        Number(r[2] || 0),
                        Number(r[3] || 0),
                        Number(r[4] || 0),
                        Number(r[5] || 0),
                        total,
                        customers,
                        bval
                    ];
                });
                const wsData = [header, ...rows];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, 'Sales');
                XLSX.writeFile(wb, `XanaLife_Sales_${new Date().toISOString().slice(0,10)}.xlsx`);
            }

            // ------------------------------------------------------------
            //  INIT
            // ------------------------------------------------------------
            document.addEventListener('DOMContentLoaded', function() {
                // Set default date range (last 30 days)
                const today = new Date();
                const thirtyDaysAgo = new Date(today);
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                startInput.value = thirtyDaysAgo.toISOString().split('T')[0];
                endInput.value = today.toISOString().split('T')[0];

                // Load data
                loadSales(false);

                // Event listeners
                document.getElementById('searchBtn').addEventListener('click', function() {
                    loadSales(false);
                });
                branchSelect.addEventListener('change', function() {
                    loadSales(false);
                });
                startInput.addEventListener('change', function() {
                    loadSales(false);
                });
                endInput.addEventListener('change', function() {
                    loadSales(false);
                });
                exportBtn.addEventListener('click', exportToExcel);
                refreshBtn.addEventListener('click', function() {
                    cachedData = null;
                    loadSales(true);
                });
            });

        })();
    </script>
</body>
</html>
