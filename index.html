<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.5" />
  <title>XanaLife · Branch Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#EEF1F7;
      --bg-soft:#E6EAF3;
      --surface:#FFFFFF;
      --surface-2:#F7F9FC;
      --ink:#0B1220;
      --ink-soft:#5B6478;
      --ink-faint:#8892A6;
      --border:#E3E8F1;
      --border-strong:#D3DAE8;
      --sidebar-1:#0A0F1F;
      --sidebar-2:#121B33;
      --accent:#5B6EF5;
      --accent-ink:#3846C4;
      --accent-soft:#EAEBFE;
      --good:#16B981;
      --good-soft:#D9F7EA;
      --warn:#F5A524;
      --warn-soft:#FEF1D8;
      --bad:#F0454A;
      --bad-soft:#FCE1E2;
      --ring-track:#E7EAF3;
      --radius-lg:20px;
      --radius-md:14px;
      --radius-sm:10px;
      --shadow-sm:0 1px 2px rgba(15,23,42,0.04), 0 1px 6px rgba(15,23,42,0.04);
      --shadow-md:0 6px 24px rgba(15,23,42,0.07);
      --shadow-lg:0 16px 48px rgba(15,23,42,0.14);
      --font-display:'Plus Jakarta Sans', sans-serif;
      --font-body:'Inter', -apple-system, sans-serif;
      --font-mono:'JetBrains Mono', monospace;
      --sidebar-width:272px;
    }
    body.theme-dark{
      --bg:#0A0E1A;
      --bg-soft:#0D1220;
      --surface:#131A2C;
      --surface-2:#0F1526;
      --ink:#EAEEFB;
      --ink-soft:#9AA3BC;
      --ink-faint:#6B7492;
      --border:#232C44;
      --border-strong:#2E3852;
      --sidebar-1:#060810;
      --sidebar-2:#0A0F1D;
      --accent-soft:#1C2050;
      --good-soft:#0E2A26;
      --warn-soft:#2E2410;
      --bad-soft:#2E1418;
      --ring-track:#232C44;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
      --shadow-md:0 6px 24px rgba(0,0,0,0.35);
      --shadow-lg:0 16px 48px rgba(0,0,0,0.5);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{ background:var(--bg); font-family:var(--font-body); color:var(--ink); display:flex; min-height:100vh; transition:background .25s, color .25s; }
    ::selection{ background:var(--accent); color:#fff; }
    .sidebar{ position:fixed; top:0; left:0; width:var(--sidebar-width); height:100vh; background:linear-gradient(185deg, var(--sidebar-2), var(--sidebar-1)); color:#B9C2DB; padding:1.6rem 0 1.2rem; overflow-y:auto; z-index:1050; transition:transform .3s cubic-bezier(.4,0,.2,1); box-shadow:4px 0 32px rgba(0,0,0,0.25); display:flex; flex-direction:column; }
    .sidebar .brand{ font-family:var(--font-display); font-size:1.28rem; font-weight:800; padding:0 1.6rem 1.4rem; display:flex; align-items:center; gap:12px; color:#fff; border-bottom:1px solid rgba(255,255,255,.06); }
    .sidebar .brand .mark{ width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#6E7CF7,#8B5CF6); box-shadow:0 6px 18px rgba(110,124,247,.45); font-size:1.1rem; color:#fff; flex:none; }
    .sidebar .brand .name-grad{ background:linear-gradient(135deg,#9DB0FF,#C9B6FF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .sidebar .nav-label{ font-size:.66rem; text-transform:uppercase; letter-spacing:1.2px; color:#4C567A; font-weight:700; padding:1.3rem 1.6rem .5rem; }
    .sidebar .nav-item{ padding:.7rem 1.6rem; cursor:pointer; display:flex; align-items:center; gap:13px; color:#9AA3C2; font-weight:600; font-size:.87rem; border-left:3px solid transparent; transition:all .18s; }
    .sidebar .nav-item:hover{ background:rgba(255,255,255,.045); color:#F1F4FF; border-left-color:#3C4670; }
    .sidebar .nav-item.active{ background:rgba(91,110,245,.16); color:#fff; border-left-color:var(--accent); }
    .sidebar .nav-item{ position:relative; }
    .sidebar .nav-item i{ font-size:1.1rem; width:22px; text-align:center; color:#5C6690; }
    .sidebar .nav-item.active i{ color:#B4BFFF; }
    .sidebar .nav-divider{ height:1px; background:rgba(255,255,255,.05); margin:.5rem 1.6rem; }
    .sidebar-footer{ margin-top:auto; padding:1rem 1.6rem 0; }
    .theme-toggle-btn{ width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:#C6CEE8; border-radius:12px; padding:.55rem .9rem; font-size:.8rem; font-weight:600; display:flex; align-items:center; justify-content:space-between; }
    .theme-toggle-btn:hover{ background:rgba(255,255,255,.09); }
    .version-tag{ font-size:.68rem; color:#4C567A; padding:.9rem 1.6rem 0; }
    .main-content{ margin-left:var(--sidebar-width); flex:1; padding:1.6rem 2.1rem 3rem; min-height:100vh; width:calc(100% - var(--sidebar-width)); }
    .sidebar-toggle{ display:none; background:var(--sidebar-1); color:#fff; border:none; padding:.55rem 1.1rem; border-radius:11px; font-size:1.05rem; margin-bottom:1rem; }
    .sidebar-overlay{ display:none; position:fixed; inset:0; background:rgba(5,8,16,.55); backdrop-filter:blur(3px); z-index:1040; }
    .topbar-title{ font-family:var(--font-display); font-weight:800; font-size:1.5rem; color:var(--ink); letter-spacing:-.01em; }
    .topbar-sub{ color:var(--ink-faint); font-size:.83rem; margin-top:2px; }
    .pill{ font-size:.72rem; font-weight:600; padding:.32rem .8rem; border-radius:20px; display:inline-flex; align-items:center; gap:6px; }
    .pill-dot{ width:6px; height:6px; border-radius:50%; }
    .pill-neutral{ background:var(--surface-2); color:var(--ink-soft); border:1px solid var(--border); }
    .pill-live{ background:var(--good-soft); color:var(--good); }
    .pill-loading{ background:var(--surface-2); color:var(--ink-soft); border:1px solid var(--border); }
    .pill-error{ background:var(--bad-soft); color:var(--bad); }
    .icon-btn{ background:var(--surface); border:1px solid var(--border); color:var(--ink-soft); border-radius:12px; padding:.55rem .95rem; font-weight:600; font-size:.85rem; display:inline-flex; align-items:center; gap:8px; transition:all .15s; box-shadow:var(--shadow-sm); }
    .icon-btn:hover{ border-color:var(--border-strong); transform:translateY(-1px); box-shadow:var(--shadow-md); color:var(--ink); }
    .btn-solid{ background:var(--ink); color:#fff; border:none; border-radius:12px; padding:.55rem 1.3rem; font-weight:700; font-size:.85rem; display:inline-flex; align-items:center; gap:8px; transition:all .15s; box-shadow:var(--shadow-sm); }
    .btn-solid:hover{ background:var(--accent-ink); transform:translateY(-1px); box-shadow:0 8px 20px rgba(56,70,196,.28); color:#fff; }
    .filter-card{ background:var(--surface); border-radius:var(--radius-lg); padding:1.3rem 1.5rem; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
    .range-chip{ border:1px solid var(--border); background:var(--surface-2); color:var(--ink-soft); font-size:.78rem; font-weight:600; padding:.4rem 1rem; border-radius:20px; transition:all .15s; cursor:pointer; }
    .range-chip:hover{ border-color:var(--border-strong); color:var(--ink); }
    .range-chip.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
    .theme-dark .range-chip.active{ background:var(--accent); border-color:var(--accent); }
    .filter-card .form-label{ font-size:.7rem; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-faint); font-weight:700; margin-bottom:.3rem; }
    .filter-card .form-control, .filter-card .form-select{ border-radius:11px; border:1px solid var(--border); background:var(--surface-2); font-size:.9rem; padding:.55rem .9rem; color:var(--ink); }
    .filter-card .form-control:focus, .filter-card .form-select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); background:var(--surface); }
    .stat-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.15rem 1.35rem; box-shadow:var(--shadow-sm); transition:transform .18s, box-shadow .18s; }
    .stat-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .stat-icon{ font-size:1.15rem; width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:12px; flex:none; }
    .stat-label{ font-size:.7rem; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-faint); font-weight:700; }
    .stat-number{ font-family:var(--font-display); font-size:1.68rem; font-weight:800; color:var(--ink); letter-spacing:-.02em; line-height:1.15; }
    .stat-sub{ font-size:.72rem; color:var(--ink-faint); margin-top:2px; }
    .stat-spark{ height:34px; margin-top:.4rem; }
    .card-modern{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); }
    .card-modern .card-header{ background:transparent; border-bottom:1px solid var(--border); font-weight:700; font-family:var(--font-display); padding:1.1rem 1.4rem; font-size:.95rem; color:var(--ink); }
    .card-modern .card-body{ padding:1.4rem; }
    .table-modern{ border-collapse:separate; border-spacing:0; color:var(--ink); }
    .table-modern thead th{ background:var(--surface-2); color:var(--ink-soft); font-weight:700; font-size:.66rem; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--border); padding:.75rem 1rem; border-top:none; }
    .table-modern tbody td{ padding:.75rem 1rem; border-bottom:1px solid var(--border); vertical-align:middle; font-size:.87rem; }
    .table-modern tbody tr:hover{ background:var(--surface-2); }
    .badge-achievement{ font-size:.68rem; padding:.28rem .8rem; border-radius:20px; font-weight:700; white-space:nowrap; }
    .badge-achievement.above{ background:var(--good-soft); color:var(--good); }
    .badge-achievement.on{ background:var(--warn-soft); color:var(--warn); }
    .badge-achievement.below{ background:var(--bad-soft); color:var(--bad); }
    .rank-medal{ font-size:1.25rem; width:30px; display:inline-block; text-align:center; }
    .rank-number{ font-weight:700; font-size:.92rem; color:var(--ink-faint); font-family:var(--font-mono); }
    .chart-container{ position:relative; height:250px; }
    .computation-box{ background:var(--surface-2); border-radius:10px; padding:.55rem 1.1rem; font-size:.78rem; font-family:var(--font-mono); border:1px solid var(--border); margin-top:.2rem; color:var(--ink-soft); }
    .computation-box .label{ color:var(--ink-faint); font-weight:600; }
    .computation-box .value{ color:var(--ink); font-weight:700; }
    .computation-box .highlight{ color:var(--accent); font-weight:700; }
    .date-range-badge{ font-size:.68rem; background:var(--accent-soft); color:var(--accent-ink); padding:.15rem .7rem; border-radius:12px; font-weight:600; }
    .branch-kpi-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:.95rem 1.1rem; box-shadow:var(--shadow-sm); display:flex; gap:.9rem; align-items:center; transition:transform .15s, box-shadow .15s; }
    .branch-kpi-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow-md); }
    .branch-kpi-card .ring{ flex:none; }
    .branch-kpi-card .ring-text{ font-family:var(--font-mono); font-weight:700; fill:var(--ink); font-size:13px; }
    .branch-kpi-card .branch-name{ font-weight:700; color:var(--ink); font-size:.86rem; }
    .branch-kpi-card .kpi-mini{ display:flex; justify-content:space-between; font-size:.72rem; color:var(--ink-faint); }
    .branch-kpi-card .kpi-mini b{ color:var(--ink); font-weight:700; font-family:var(--font-mono); font-size:.76rem; }
    .filter-indicator{ background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:.25rem .9rem; font-size:.72rem; color:var(--ink-soft); font-weight:600; }
    .fade-in{ animation:fadeInUp .28s ease both; }
    @keyframes fadeInUp{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }
    .toast-stack{ position:fixed; bottom:1.4rem; right:1.4rem; z-index:2000; display:flex; flex-direction:column; gap:.6rem; }
    .toast-item{ background:var(--ink); color:#fff; padding:.75rem 1.1rem; border-radius:12px; font-size:.85rem; font-weight:600; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; min-width:220px; animation:toastIn .25s ease both; }
    .toast-item.error{ background:var(--bad); }
    .toast-item.success{ background:var(--good); }
    @keyframes toastIn{ from{ opacity:0; transform:translateY(10px) scale(.96);} to{ opacity:1; transform:none;} }
    @media (max-width:992px){ .sidebar{ transform:translateX(-100%); } .sidebar.open{ transform:translateX(0); } .sidebar-overlay.open{ display:block; } .main-content{ margin-left:0; width:100%; padding:1rem; } .sidebar-toggle{ display:inline-flex; align-items:center; gap:8px; } }
    @media (max-width:768px){ .stat-number{ font-size:1.3rem; } .filter-card{ padding:1rem; } .card-modern .card-body{ padding:1rem; } }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="brand"><div class="mark"><i class="bi bi-graph-up-arrow"></i></div><span>Xana<span class="name-grad">Life</span></span></div>
  <div class="nav-label">Analytics</div>
  <div class="nav-item active" data-view="overview"><i class="bi bi-grid-1x2-fill"></i> Overview</div>
  <div class="nav-item" data-view="targets"><i class="bi bi-bullseye"></i> Targets</div>
  <div class="nav-item" data-view="mom"><i class="bi bi-arrow-up-right-circle"></i> Month on Month</div>
  <div class="nav-item" data-view="wow"><i class="bi bi-calendar-week"></i> Week on Week</div>
  <div class="nav-divider"></div>
  <div class="nav-item" data-view="ranking"><i class="bi bi-trophy"></i> Top / Bottom</div>
  <div class="sidebar-footer">
    <button class="theme-toggle-btn" id="themeToggle"><span><i class="bi bi-moon-stars me-2"></i>Dark mode</span><i class="bi bi-toggle-off" id="themeToggleIcon"></i></button>
  </div>
  <div class="version-tag"><i class="bi bi-info-circle"></i> v4.0 · Daily Targets</div>
</nav>

<div class="main-content">
  <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i> Menu</button>
  <div class="d-flex flex-wrap align-items-center justify-content-between mb-3 gap-2">
    <div>
      <h2 class="topbar-title mb-0" id="pageTitle"><i class="bi bi-grid-1x2-fill me-2" style="color:var(--accent);"></i>Overview</h2>
      <div class="d-flex align-items-center flex-wrap gap-2 mt-2">
        <span class="pill pill-loading" id="statusBadge"><span class="pill-dot" style="background:#F5A524;"></span> Loading…</span>
        <span class="pill pill-live" id="dataModeBadge"><i class="bi bi-database"></i> LIVE</span>
        <span class="filter-indicator" id="filterIndicator">All dates</span>
      </div>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="icon-btn" id="exportExcelBtn"><i class="bi bi-file-earmark-excel"></i>Export</button>
      <button class="icon-btn" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i>Refresh</button>
    </div>
  </div>

  <div class="filter-card mb-4">
    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
      <span class="range-chip" data-range="today">Today</span>
      <span class="range-chip" data-range="7d">Last 7 days</span>
      <span class="range-chip active" data-range="month">This Month</span>
      <span class="range-chip" data-range="all">All Time</span>
      <button class="icon-btn ms-auto py-1 px-3" style="font-size:.78rem;" id="resetFiltersBtn"><i class="bi bi-x-circle"></i>Reset</button>
    </div>
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label">Branch</label>
        <select id="branch" class="form-select"><option value="">All Branches</option></select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Start Date</label>
        <input type="date" id="start" class="form-control" />
      </div>
      <div class="col-md-3">
        <label class="form-label">End Date</label>
        <input type="date" id="end" class="form-control" />
      </div>
      <div class="col-md-3 d-grid">
        <button class="btn-solid justify-content-center" id="searchBtn"><i class="bi bi-search"></i>Apply</button>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-4" id="kpiRow">
    <div class="col-md-3 col-6"><div class="stat-card"><div class="d-flex align-items-start justify-content-between"><div><div class="stat-label">Total Sales</div><div class="stat-number" id="totalSales">0</div><div class="stat-sub" id="totalSalesSub">filtered</div></div><div class="stat-icon" style="background:var(--accent-soft);color:var(--accent);"><i class="bi bi-cash-stack"></i></div></div><div class="stat-spark"><canvas id="sparkSales"></canvas></div></div></div>
    <div class="col-md-3 col-6"><div class="stat-card"><div class="d-flex align-items-start justify-content-between"><div><div class="stat-label">Customers</div><div class="stat-number" id="customers">0</div><div class="stat-sub" id="customersSub">filtered</div></div><div class="stat-icon" style="background:var(--good-soft);color:var(--good);"><i class="bi bi-people"></i></div></div><div class="stat-spark"><canvas id="sparkCustomers"></canvas></div></div></div>
    <div class="col-md-3 col-6"><div class="stat-card"><div class="d-flex align-items-start justify-content-between"><div><div class="stat-label">Basket Value</div><div class="stat-number" id="basketValue">0.00</div><div class="stat-sub" id="basketSub">avg per customer</div></div><div class="stat-icon" style="background:var(--warn-soft);color:var(--warn);"><i class="bi bi-cart-check"></i></div></div></div></div>
    <div class="col-md-3 col-6"><div class="stat-card"><div class="d-flex align-items-start justify-content-between"><div><div class="stat-label">Avg Achievement</div><div class="stat-number" id="avgAchievement">0%</div><div class="stat-sub" id="avgAchievementSub">target branches</div></div><div class="stat-icon" style="background:var(--bad-soft);color:var(--bad);"><i class="bi bi-bullseye"></i></div></div></div></div>
  </div>

  <div class="row g-3 mb-4" id="branchKpiRow"></div>
  <div id="dynamicPanel"></div>
</div>
<div class="toast-stack" id="toastStack"></div>

<script>
(function(){
  // ----- config -----
  const API = "https://script.google.com/macros/s/AKfycbyBZt6KqVPjU7boOunFBEAzHb8pPDLxbg8dizECxyUJMFa5bcElR0UVe1AcWvNpcIxo/exec";
  const DAILY_TARGETS = { 'KATANI': 50000, 'SYOKIMAU': 450000, 'RUIRU': 300000 };
  const CURRENT_MONTH = '2026-07';
  const DAYS_IN_MONTH = 31;

  let cachedData = null, filteredRows = [], usingDemoData = false, currentView = 'overview';
  let chartMain = null, sparkSalesChart = null, sparkCustomersChart = null;

  const branchSelect = document.getElementById('branch');
  const startInput = document.getElementById('start');
  const endInput = document.getElementById('end');
  const totalSalesEl = document.getElementById('totalSales');
  const customersEl = document.getElementById('customers');
  const basketEl = document.getElementById('basketValue');
  const avgAchievementEl = document.getElementById('avgAchievement');
  const totalSalesSub = document.getElementById('totalSalesSub');
  const customersSub = document.getElementById('customersSub');
  const basketSub = document.getElementById('basketSub');
  const avgAchievementSub = document.getElementById('avgAchievementSub');
  const exportBtn = document.getElementById('exportExcelBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const statusBadge = document.getElementById('statusBadge');
  const dataModeBadge = document.getElementById('dataModeBadge');
  const pageTitle = document.getElementById('pageTitle');
  const dynamicPanel = document.getElementById('dynamicPanel');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const branchKpiRow = document.getElementById('branchKpiRow');
  const filterIndicator = document.getElementById('filterIndicator');
  const toastStack = document.getElementById('toastStack');
  const themeToggle = document.getElementById('themeToggle');
  const themeToggleIcon = document.getElementById('themeToggleIcon');

  function showToast(msg, type){ type=type||'default'; const el=document.createElement('div'); el.className='toast-item'+(type==='default'?'':' '+type); const icon=type==='error'?'bi-exclamation-circle':type==='success'?'bi-check-circle':'bi-info-circle'; el.innerHTML=`<i class="bi ${icon}"></i><span>${msg}</span>`; toastStack.appendChild(el); setTimeout(()=>{ el.style.transition='opacity .25s, transform .25s'; el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(()=>el.remove(),260); },3200); }
  function setTheme(dark){ document.body.classList.toggle('theme-dark', dark); themeToggleIcon.className = dark ? 'bi bi-toggle-on' : 'bi bi-toggle-off'; }
  themeToggle.addEventListener('click', ()=> setTheme(!document.body.classList.contains('theme-dark')));

  // ============================================================
  // FINAL DATE HANDLING SOLUTION - Handles dd-mm-yy format properly
  // ============================================================
  
  function convertToYYYYMMDD(dateInput) {
    if (!dateInput) return null;
    
    // If it's already a Date object
    if (dateInput instanceof Date) {
      const year = dateInput.getFullYear();
      const month = String(dateInput.getMonth() + 1).padStart(2, '0');
      const day = String(dateInput.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    
    const dateStr = String(dateInput).trim();
    
    // Check for dd-mm-yy or dd/mm/yy format (your data format)
    let match = dateStr.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{1,2})$/);
    if (match) {
      let day = parseInt(match[1]);
      let month = parseInt(match[2]);
      let year = parseInt(match[3]);
      
      // Convert 2-digit year to 4-digit
      if (year < 100) {
        year = year + 2000;
      }
      
      // Validate date
      const testDate = new Date(year, month - 1, day);
      if (testDate.getFullYear() === year && 
          testDate.getMonth() === month - 1 && 
          testDate.getDate() === day) {
        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      }
    }
    
    // Check for YYYY-MM-DD format
    match = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (match) {
      const year = parseInt(match[1]);
      const month = parseInt(match[2]);
      const day = parseInt(match[3]);
      const testDate = new Date(year, month - 1, day);
      if (testDate.getFullYear() === year && 
          testDate.getMonth() === month - 1 && 
          testDate.getDate() === day) {
        return dateStr;
      }
    }
    
    // Try parsing as date
    try {
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }
    } catch(e) {}
    
    return null;
  }

  function compareDates(date1, date2) {
    const d1 = convertToYYYYMMDD(date1);
    const d2 = convertToYYYYMMDD(date2);
    if (!d1 || !d2) return 0;
    if (d1 < d2) return -1;
    if (d1 > d2) return 1;
    return 0;
  }

  function isDateInRange(dateStr, startStr, endStr) {
    const date = convertToYYYYMMDD(dateStr);
    if (!date) return true;
    
    // If no start and end, include all
    if (!startStr && !endStr) return true;
    
    // Check start (inclusive)
    if (startStr) {
      const start = convertToYYYYMMDD(startStr);
      if (start && date < start) return false;
    }
    
    // Check end (inclusive)
    if (endStr) {
      const end = convertToYYYYMMDD(endStr);
      if (end && date > end) return false;
    }
    
    return true;
  }

  function extractDateString(v){
    if(!v) return null;
    const converted = convertToYYYYMMDD(v);
    return converted;
  }

  function formatDateForDisplay(v){
    if(!v) return '';
    const converted = convertToYYYYMMDD(v);
    if (!converted) return String(v);
    const parts = converted.split('-');
    return `${parts[2]}-${parts[1]}-${parts[0].slice(-2)}`;
  }

  function getTodayStr(){
    const d = new Date();
    return d.toISOString().split('T')[0];
  }

  function getMonthStart(){
    return '2026-07-01';
  }

  function getMonthEnd(){
    return '2026-07-31';
  }

  function getWeekAgo(){
    const d = new Date();
    d.setDate(d.getDate() - 6);
    return d.toISOString().split('T')[0];
  }

  function getWeekOfYear(ds){ 
    const d = new Date(ds + 'T00:00:00'); 
    const s = new Date(d.getFullYear(),0,1); 
    const diff = (d - s + (s.getTimezoneOffset() - d.getTimezoneOffset()) * 60000) / 86400000; 
    return Math.ceil((diff + s.getDay() + 1) / 7); 
  }
  
  function getWeekDateRange(wk, yr){ 
    const s = new Date(yr,0,1); 
    const days = (wk-1)*7 - s.getDay() + 1; 
    const st = new Date(yr,0,days); 
    const en = new Date(st); 
    en.setDate(en.getDate() + 6); 
    const f = d => String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear(); 
    return f(st) + ' - ' + f(en); 
  }
  
  function getMonthDateRange(ms){ 
    const [y,m] = ms.split('-').map(Number); 
    const st = new Date(y,m-1,1); 
    const en = new Date(y,m,0); 
    const f = d => String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear(); 
    return f(st) + ' - ' + f(en); 
  }
  
  function getUniqueBranches(rows){ 
    const s = new Set(); 
    rows.forEach(r => { 
      const b = String(r[1] || '').trim().toUpperCase(); 
      if(b && !b.toLowerCase().includes('branch')) s.add(b); 
    }); 
    return Array.from(s).sort(); 
  }
  
  function updateBranchFilter(rows){ 
    const cur = branchSelect.value; 
    const branches = getUniqueBranches(rows); 
    branchSelect.innerHTML = '<option value="">All Branches</option>'; 
    branches.forEach(b => { 
      const opt = document.createElement('option'); 
      opt.value = b; 
      opt.textContent = b; 
      branchSelect.appendChild(opt); 
    }); 
    if(cur && branches.includes(cur)) branchSelect.value = cur; 
  }
  
  function setStatus(type, msg){ 
    const colors = {loading:'#F5A524', success:'#16B981', error:'#F0454A'}; 
    const cls = {loading:'pill-loading', success:'pill-live', error:'pill-error'}; 
    statusBadge.className = 'pill ' + (type === 'success' ? 'pill-neutral' : (cls[type] || 'pill-neutral')); 
    statusBadge.innerHTML = `<span class="pill-dot" style="background:${colors[type] || '#8892A6'};"></span> ${msg}`; 
  }
  
  function normalizeBranch(n){ 
    if(!n) return ''; 
    const u = n.toUpperCase().trim(); 
    for(const k of Object.keys(DAILY_TARGETS)) if(u.includes(k)) return k; 
    return u; 
  }
  
  function getMonthlyTarget(b){ 
    const d = DAILY_TARGETS[b]; 
    return d ? d * DAYS_IN_MONTH : 0; 
  }
  
  function getDateRangeLabel(rows){ 
    if(!rows || !rows.length) return 'No data'; 
    const dates = rows.map(r => extractDateString(r[0])).filter(d => d).sort(); 
    if(!dates.length) return 'No dates'; 
    const start = formatDateForDisplay(dates[0]);
    const end = formatDateForDisplay(dates[dates.length - 1]);
    return start + ' → ' + end; 
  }
  
  function countDistinctDays(rows){ 
    const s = new Set(); 
    rows.forEach(r => { 
      const d = extractDateString(r[0]); 
      if(d) s.add(d); 
    }); 
    return s.size; 
  }

  function progressRing(pct, opts={}){ 
    const size = opts.size || 58, stroke = opts.stroke || 7, radius = (size - stroke) / 2, circ = 2 * Math.PI * radius, clamped = Math.max(0, Math.min(pct || 0, 100)), offset = circ - (clamped / 100) * circ; 
    const color = !isFinite(pct) ? 'var(--ink-faint)' : pct >= 100 ? 'var(--good)' : pct >= 80 ? 'var(--accent)' : pct >= 60 ? 'var(--warn)' : 'var(--bad)'; 
    const label = isFinite(pct) ? Math.round(pct) + '%' : '—'; 
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ring"><circle cx="${size/2}" cy="${size/2}" r="${radius}" stroke="var(--ring-track)" stroke-width="${stroke}" fill="none"/><circle cx="${size/2}" cy="${size/2}" r="${radius}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .5s;"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" class="ring-text">${label}</text></svg>`; 
  }

  // ----- fetch live data -----
  async function loadData(forceRefresh){

          if(raw.data && Array.isArray(raw.data)) raw = raw.data;

  // ----- FIXED: Proper inclusive date range filtering with dd-mm-yy support -----
  function getFilteredData(){
    if(!cachedData) return [];
    let rows = cachedData;
    if(rows.length && String(rows[0][0] || '').toLowerCase().includes('date')) rows = rows.slice(1);
    if(!rows.length) return [];
    const branch = branchSelect.value;
    const startVal = startInput.value;
    const endVal = endInput.value;
    
    let filtered = rows;
    if(branch) filtered = filtered.filter(r => String(r[1] || '').trim().toUpperCase() === branch);
    
    // Apply date range filter with inclusive logic
    if(startVal || endVal) {
      filtered = filtered.filter(r => {
        const dateStr = r[0];
        if (!dateStr) return true;
        // Check if date is in range (inclusive)
        return isDateInRange(dateStr, startVal, endVal);
      });
    }
    
    return filtered;
  }

  function calculateTargetStats(rows){
    const monthRows = rows.filter(r => {
      const ds = extractDateString(r[0]);
      return ds && ds.startsWith(CURRENT_MONTH);
    });
    const branchMap = new Map();
    monthRows.forEach(r => {
      const raw = String(r[1] || '').trim().toUpperCase();
      const key = normalizeBranch(raw);
      if(!key) return;
      const total = Number(r[6] || 0), cust = Number(r[7] || 0);
      if(!branchMap.has(key)) branchMap.set(key, {sales:0, customers:0, count:0, rawNames:new Set()});
      const e = branchMap.get(key);
      e.sales += total; e.customers += cust; e.count++; e.rawNames.add(raw);
    });
    const results = [];
    let totalAchievement = 0, targetBranches = 0;
    for(const [branch, data] of branchMap){
      const monthlyTarget = getMonthlyTarget(branch);
      const achievement = monthlyTarget > 0 ? (data.sales / monthlyTarget) * 100 : 0;
      const status = achievement >= 100 ? 'above' : achievement >= 80 ? 'on' : achievement >= 60 ? 'below' : 'struggling';
      const statusLabel = achievement >= 100 ? '✅ Above' : achievement >= 80 ? '⚠️ On' : achievement >= 60 ? '🔴 Below' : '🚨 Struggling';
      if(monthlyTarget > 0){ totalAchievement += achievement; targetBranches++; }
      results.push({
        branch, displayName: Array.from(data.rawNames).join(', '),
        dailyTarget: DAILY_TARGETS[branch] || 0, monthlyTarget, actual: data.sales,
        customers: data.customers, achievement, status, statusLabel,
        gap: monthlyTarget - data.sales,
        avgBasket: data.customers > 0 ? data.sales / data.customers : 0,
        transactions: data.count
      });
    }
    results.sort((a,b) => b.achievement - a.achievement);
    const avgAchievement = targetBranches > 0 ? totalAchievement / targetBranches : 0;
    return { branches: results, avgAchievement };
  }

  function calculateMoM(rows){
    const monthMap = new Map();
    rows.forEach(r => {
      const ds = extractDateString(r[0]);
      if(!ds) return;
      const month = ds.substring(0,7);
      const branch = String(r[1] || '').trim().toUpperCase();
      const key = branch + '|' + month;
      const total = Number(r[6] || 0);
      if(!monthMap.has(key)) monthMap.set(key, 0);
      monthMap.set(key, monthMap.get(key) + total);
    });
    const branchMonths = new Map();
    for(const [key, total] of monthMap){
      const [branch, month] = key.split('|');
      if(!branchMonths.has(branch)) branchMonths.set(branch, new Map());
      branchMonths.get(branch).set(month, total);
    }
    const results = [];
    for(const [branch, months] of branchMonths){
      const sortedMonths = Array.from(months.keys()).sort();
      const entries = sortedMonths.map(m => ({ month: m, sales: months.get(m) }));
      for(let i = 1; i < entries.length; i++){
        const prev = entries[i-1].sales, curr = entries[i].sales;
        const growth = prev > 0 ? ((curr - prev) / prev) * 100 : 0;
        const currentMonthRange = getMonthDateRange(entries[i].month);
        const previousMonthRange = getMonthDateRange(entries[i-1].month);
        results.push({
          branch, month: entries[i].month, monthRange: currentMonthRange,
          previousMonth: entries[i-1].month, previousMonthRange,
          current: curr, previous: prev, growth,
          growthLabel: growth > 5 ? '📈 Growing' : growth < -5 ? '📉 Declining' : '➡️ Stable'
        });
      }
    }
    results.sort((a,b) => b.growth - a.growth);
    return results;
  }

  function calculateWoW(rows){
    const weekMap = new Map();
    rows.forEach(r => {
      const ds = extractDateString(r[0]);
      if(!ds) return;
      const weekNum = getWeekOfYear(ds);
      const year = ds.substring(0,4);
      const weekKey = `${year}-W${String(weekNum).padStart(2,'0')}`;
      const branch = String(r[1] || '').trim().toUpperCase();
      const key = branch + '|' + weekKey;
      const total = Number(r[6] || 0);
      if(!weekMap.has(key)) weekMap.set(key, 0);
      weekMap.set(key, weekMap.get(key) + total);
    });
    const branchWeeks = new Map();
    for(const [key, total] of weekMap){
      const [branch, week] = key.split('|');
      if(!branchWeeks.has(branch)) branchWeeks.set(branch, new Map());
      branchWeeks.get(branch).set(week, total);
    }
    const results = [];
    for(const [branch, weeks] of branchWeeks){
      const sortedWeeks = Array.from(weeks.keys()).sort();
      const entries = sortedWeeks.map(w => ({ week: w, sales: weeks.get(w) }));
      for(let i = 1; i < entries.length; i++){
        const prev = entries[i-1].sales, curr = entries[i].sales;
        const growth = prev > 0 ? ((curr - prev) / prev) * 100 : 0;
        const prevWeekNum = parseInt(entries[i-1].week.split('-W')[1]);
        const currWeekNum = parseInt(entries[i].week.split('-W')[1]);
        const year = entries[i].week.split('-')[0];
        const currentWeekRange = getWeekDateRange(currWeekNum, parseInt(year));
        const previousWeekRange = getWeekDateRange(prevWeekNum, parseInt(year));
        results.push({
          branch, week: entries[i].week, weekNumber: currWeekNum, weekRange: currentWeekRange,
          previousWeek: entries[i-1].week, previousWeekNumber: prevWeekNum, previousWeekRange,
          current: curr, previous: prev, growth,
          growthLabel: growth > 10 ? '📈 Strong' : growth > 0 ? '📈 Up' : growth < -10 ? '📉 Drop' : '➡️ Stable'
        });
      }
    }
    results.sort((a,b) => b.growth - a.growth);
    return results;
  }

  function calculateRanking(rows){
    const branchMap = new Map();
    rows.forEach(r => {
      const branch = String(r[1] || '').trim().toUpperCase();
      if(!branch) return;
      const total = Number(r[6] || 0);
      if(!branchMap.has(branch)) branchMap.set(branch, 0);
      branchMap.set(branch, branchMap.get(branch) + total);
    });
    const rankings = Array.from(branchMap.entries()).map(([branch, sales]) => ({
      branch, sales,
      dailyTarget: DAILY_TARGETS[branch] || 0,
      monthlyTarget: getMonthlyTarget(branch),
      achievement: DAILY_TARGETS[branch] ? (sales / getMonthlyTarget(branch)) * 100 : null
    }));
    rankings.sort((a,b) => b.sales - a.sales);
    return rankings.map((item, idx) => ({ ...item, rank: idx+1, rankLabel: idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}` }));
  }

    const stats = calculateTargetStats(rows);
    const { branches, avgAchievement } = stats;
    avgAchievementEl.textContent = avgAchievement.toFixed(2) + '%';
    avgAchievementSub.textContent = `${CURRENT_MONTH} target branches`;
    let cardsHtml = '<div class="row g-3 mb-3">';
    if(!branches.length) cardsHtml += `<div class="col-12"><div class="card-modern"><div class="card-body text-center text-muted py-4">No target branches for ${CURRENT_MONTH}</div></div></div>`;
    else branches.forEach(b => {
      cardsHtml += `<div class="col-md-4"><div class="card-modern h-100"><div class="card-body d-flex align-items-center gap-3">${progressRing(b.achievement,{size:70,stroke:8})}<div><div style="font-weight:700;">${b.displayName}</div><span class="badge-achievement ${b.status}">${b.statusLabel}</span><div class="stat-sub mt-1">${b.gap>=0?'Remaining':'Over target'}: <strong>${Math.abs(b.gap).toLocaleString()}</strong></div></div></div></div></div>`;
    });
    cardsHtml += '</div>';
    let html = cardsHtml + `<div class="card-modern fade-in"><div class="card-header">Branch Target Achievement — ${CURRENT_MONTH}</div><div class="card-body p-0"><div class="table-responsive"><table class="table table-modern mb-0"><thead><tr><th>Branch</th><th>Daily Target</th><th>Monthly Target</th><th>Actual</th><th>Achievement</th><th>Gap</th><th>Status</th></tr></thead><tbody>`;
    if(!branches.length) html += `<tr><td colspan="7" class="text-center text-muted py-4">No target branches</td></tr>`;
    else branches.forEach(b => {
      html += `<tr><td><strong>${b.displayName}</strong></td><td>${b.dailyTarget.toLocaleString()}</td><td>${b.monthlyTarget.toLocaleString()}</td><td>${b.actual.toLocaleString()}</td><td><strong>${b.achievement.toFixed(2)}%</strong></td><td>${b.gap>=0?'✅':'🔴'} ${Math.abs(b.gap).toLocaleString()}</td><td><span class="badge-achievement ${b.status}">${b.statusLabel}</span></td></tr><tr class="bg-light"><td colspan="7" style="padding:0.4rem 1rem;"><div class="computation-box"><span class="label">Computation:</span> Daily Target <span class="value">${b.dailyTarget.toLocaleString()}</span> × ${DAYS_IN_MONTH} days = <span class="highlight">${b.monthlyTarget.toLocaleString()}</span> &nbsp;|&nbsp; Actual <span class="value">${b.actual.toLocaleString()}</span> ÷ Target × 100 = <span class="highlight">${b.achievement.toFixed(2)}%</span></div></td></tr>`;
    });
    html += `</tbody></table></div></div></div>`;
    dynamicPanel.innerHTML = html;
    updateKPIs(rows);
    renderBranchKPIs(rows);
    renderSparklines(rows);
  }

  function renderMoM(rows){
    const data = calculateMoM(rows);
    const avgGrowth = data.length ? data.reduce((s,i) => s + i.growth, 0) / data.length : 0;
    avgAchievementEl.textContent = avgGrowth.toFixed(2) + '%';
    avgAchievementSub.textContent = 'avg MoM growth';
    let html = `<div class="card-modern fade-in"><div class="card-header">Month on Month Growth</div><div class="card-body p-0"><div class="table-responsive"><table class="table table-modern mb-0"><thead><tr><th>Branch</th><th>Current Month</th><th>Previous Month</th><th>Current Sales</th><th>Previous Sales</th><th>Growth</th><th>Trend</th></tr></thead><tbody>`;
    if(!data.length) html += `<tr><td colspan="7" class="text-center text-muted py-4">No MoM data</td></tr>`;
    else data.slice(0,20).forEach(item => {
      const color = item.growth > 0 ? 'var(--good)' : item.growth < 0 ? 'var(--bad)' : 'var(--ink-faint)';
      html += `<tr><td><strong>${item.branch}</strong></td><td><span class="date-range-badge">${item.month} (${item.monthRange})</span></td><td><span class="date-range-badge">${item.previousMonth} (${item.previousMonthRange})</span></td><td>${item.current.toLocaleString()}</td><td>${item.previous.toLocaleString()}</td><td style="color:${color};font-weight:700;">${item.growth>0?'+':''}${item.growth.toFixed(2)}%</td><td>${item.growthLabel}</td></tr><tr class="bg-light"><td colspan="7" style="padding:0.4rem 1rem;"><div class="computation-box"><span class="label">Computation:</span> ${item.month} Sales <span class="value">${item.current.toLocaleString()}</span> - ${item.previousMonth} Sales <span class="value">${item.previous.toLocaleString()}</span> = <span class="highlight">${(item.current-item.previous)>0?'+':''}${(item.current-item.previous).toLocaleString()}</span> &nbsp;|&nbsp; Growth: <span class="highlight">${item.growth.toFixed(2)}%</span></div></td></tr>`;
    });
    html += `</tbody></table></div></div></div>`;
    dynamicPanel.innerHTML = html;
    updateKPIs(rows);
    renderBranchKPIs(rows);
    renderSparklines(rows);
  }

  function renderWoW(rows){
    const data = calculateWoW(rows);
    const avgGrowth = data.length ? data.reduce((s,i) => s + i.growth, 0) / data.length : 0;
    avgAchievementEl.textContent = avgGrowth.toFixed(2) + '%';
    avgAchievementSub.textContent = 'avg WoW growth';
    let html = `<div class="card-modern fade-in"><div class="card-header">Week on Week Growth</div><div class="card-body p-0"><div class="table-responsive"><table class="table table-modern mb-0"><thead><tr><th>Branch</th><th>Current Week</th><th>Previous Week</th><th>Current Sales</th><th>Previous Sales</th><th>Growth</th><th>Trend</th></tr></thead><tbody>`;
    if(!data.length) html += `<tr><td colspan="7" class="text-center text-muted py-4">No WoW data</td></tr>`;
    else data.slice(0,20).forEach(item => {
      const color = item.growth > 0 ? 'var(--good)' : item.growth < 0 ? 'var(--bad)' : 'var(--ink-faint)';
      html += `<tr><td><strong>${item.branch}</strong></td><td><span class="date-range-badge">Week ${item.weekNumber} (${item.weekRange})</span></td><td><span class="date-range-badge">Week ${item.previousWeekNumber} (${item.previousWeekRange})</span></td><td>${item.current.toLocaleString()}</td><td>${item.previous.toLocaleString()}</td><td style="color:${color};font-weight:700;">${item.growth>0?'+':''}${item.growth.toFixed(2)}%</td><td>${item.growthLabel}</td></tr><tr class="bg-light"><td colspan="7" style="padding:0.4rem 1rem;"><div class="computation-box"><span class="label">Computation:</span> Week ${item.weekNumber} Sales <span class="value">${item.current.toLocaleString()}</span> - Week ${item.previousWeekNumber} Sales <span class="value">${item.previous.toLocaleString()}</span> = <span class="highlight">${(item.current-item.previous)>0?'+':''}${(item.current-item.previous).toLocaleString()}</span> &nbsp;|&nbsp; Growth: <span class="highlight">${item.growth.toFixed(2)}%</span></div></td></tr>`;
    });
    html += `</tbody></table></div></div></div>`;
    dynamicPanel.innerHTML = html;
    updateKPIs(rows);
    renderBranchKPIs(rows);
    renderSparklines(rows);
  }

  function renderRanking(rows){
    const rankings = calculateRanking(rows);
    const avgAchiev = rankings.length ? rankings.reduce((s,i) => s + (i.achievement || 0), 0) / rankings.length : 0;
    avgAchievementEl.textContent = avgAchiev.toFixed(2) + '%';
    avgAchievementSub.textContent = 'avg achievement';
    const top = rankings.slice(0,5), bottom = rankings.slice(-5).reverse();
    let html = `<div class="row g-3"><div class="col-md-6"><div class="card-modern h-100 fade-in"><div class="card-header">Top 5 Branches</div><div class="card-body p-0"><div class="table-responsive"><table class="table table-modern mb-0"><thead><tr><th>Rank</th><th>Branch</th><th>Sales</th><th>Achievement</th></tr></thead><tbody>`;
    if(!top.length) html += `<tr><td colspan="4" class="text-center text-muted py-4">No data</td></tr>`;
    else top.forEach(item => {
      html += `<tr><td><span class="rank-medal">${item.rankLabel}</span></td><td><strong>${item.branch}</strong></td><td>${item.sales.toLocaleString()}</td><td>${item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A'}</td></tr><tr class="bg-light"><td colspan="4" style="padding:0.4rem 1rem;"><div class="computation-box"><span class="label">Computation:</span> Sales <span class="value">${item.sales.toLocaleString()}</span> ÷ Monthly Target <span class="value">${item.monthlyTarget.toLocaleString()}</span> × 100 = <span class="highlight">${item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A'}</span></div></td></tr>`;
    });
    html += `</tbody></table></div></div></div></div><div class="col-md-6"><div class="card-modern h-100 fade-in"><div class="card-header">Bottom 5 Branches</div><div class="card-body p-0"><div class="table-responsive"><table class="table table-modern mb-0"><thead><tr><th>Rank</th><th>Branch</th><th>Sales</th><th>Achievement</th></tr></thead><tbody>`;
    if(!bottom.length) html += `<tr><td colspan="4" class="text-center text-muted py-4">No data</td></tr>`;
    else bottom.forEach((item, idx) => {
      const rankNum = rankings.length - idx;
      html += `<tr><td><span class="rank-number">#${rankNum}</span></td><td><strong>${item.branch}</strong></td><td>${item.sales.toLocaleString()}</td><td>${item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A'}</td></tr><tr class="bg-light"><td colspan="4" style="padding:0.4rem 1rem;"><div class="computation-box"><span class="label">Computation:</span> Sales <span class="value">${item.sales.toLocaleString()}</span> ÷ Monthly Target <span class="value">${item.monthlyTarget.toLocaleString()}</span> × 100 = <span class="highlight">${item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A'}</span></div></td></tr>`;
    });
    html += `</tbody></table></div></div></div></div></div><div class="row mt-3"><div class="col-12"><div class="card-modern fade-in"><div class="card-header">Full Ranking</div><div class="card-body p-0"><div class="table-responsive"><table class="table table-modern mb-0"><thead><tr><th>Rank</th><th>Branch</th><th>Sales</th><th>Monthly Target</th><th>Achievement</th></tr></thead><tbody>`;
    if(!rankings.length) html += `<tr><td colspan="5" class="text-center text-muted py-4">No data</td></tr>`;
    else rankings.forEach((item, idx) => {
      html += `<tr><td><span class="rank-number">#${idx+1}</span></td><td><strong>${item.branch}</strong></td><td>${item.sales.toLocaleString()}</td><td>${item.monthlyTarget.toLocaleString()}</td><td>${item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A'}</td></tr><tr class="bg-light"><td colspan="5" style="padding:0.4rem 1rem;"><div class="computation-box"><span class="label">Computation:</span> Daily Target <span class="value">${item.dailyTarget.toLocaleString()}</span> × ${DAYS_IN_MONTH} days = <span class="highlight">${item.monthlyTarget.toLocaleString()}</span> &nbsp;|&nbsp; Achievement: <span class="highlight">${item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A'}</span></div></td></tr>`;
    });
    html += `</tbody></table></div></div></div></div></div>`;
    dynamicPanel.innerHTML = html;
    updateKPIs(rows);
    renderBranchKPIs(rows);
    renderSparklines(rows);
  }

  function updateKPIs(rows){
    const totalSales = rows.reduce((s,r) => s + Number(r[6] || 0), 0);
    const totalCustomers = rows.reduce((s,r) => s + Number(r[7] || 0), 0);
    totalSalesEl.textContent = totalSales.toLocaleString();
    customersEl.textContent = totalCustomers;
    basketEl.textContent = totalCustomers > 0 ? (totalSales / totalCustomers).toFixed(2) : '0.00';
    totalSalesSub.textContent = getDateRangeLabel(rows);
    customersSub.textContent = getDateRangeLabel(rows);
    basketSub.textContent = 'avg per customer';
    filterIndicator.textContent = getDateRangeLabel(rows);
  }

  function exportAllToExcel(){
    if(!filteredRows || !filteredRows.length){ showToast('No data to export.','error'); return; }
    const wb = XLSX.utils.book_new();
    const rawHeader = ['DATE','BRANCH','CASH','MPESA','CREDIT CARD','INVOICE','TOTAL','CUSTOMERS','B/VALUE'];
    const rawRows = filteredRows.map(r => {
      const total = Number(r[6] || 0), cust = Number(r[7] || 0), bval = cust > 0 ? total / cust : 0;
      return [formatDateForDisplay(r[0]), String(r[1] || ''), Number(r[2] || 0), Number(r[3] || 0), Number(r[4] || 0), Number(r[5] || 0), total, cust, bval];
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([rawHeader, ...rawRows]), 'Raw Data');
    const targetStats = calculateTargetStats(filteredRows);
    const targetHeader = ['Branch','Daily Target','Monthly Target','Actual Sales','Achievement %','Gap','Status'];
    const targetRows = targetStats.branches.map(b => [b.displayName, b.dailyTarget, b.monthlyTarget, b.actual, b.achievement.toFixed(2)+'%', b.gap, b.statusLabel]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([targetHeader, ...targetRows]), 'Target Achievement');
    const momData = calculateMoM(filteredRows);
    const momHeader = ['Branch','Current Month','Current Month Range','Previous Month','Previous Month Range','Current Sales','Previous Sales','Growth %','Trend'];
    const momRows = momData.map(item => [item.branch, item.month, item.monthRange, item.previousMonth, item.previousMonthRange, item.current, item.previous, item.growth.toFixed(2)+'%', item.growthLabel]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([momHeader, ...momRows]), 'Month on Month');
    const wowData = calculateWoW(filteredRows);
    const wowHeader = ['Branch','Current Week','Current Week Range','Previous Week','Previous Week Range','Current Sales','Previous Sales','Growth %','Trend'];
    const wowRows = wowData.map(item => [item.branch, item.week, item.weekRange, item.previousWeek, item.previousWeekRange, item.current, item.previous, item.growth.toFixed(2)+'%', item.growthLabel]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([wowHeader, ...wowRows]), 'Week on Week');
    const rankingData = calculateRanking(filteredRows);
    const rankHeader = ['Rank','Branch','Total Sales','Monthly Target','Achievement %'];
    const rankRows = rankingData.map(item => [item.rank, item.branch, item.sales, item.monthlyTarget, item.achievement ? item.achievement.toFixed(2)+'%' : 'N/A']);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([rankHeader, ...rankRows]), 'Branch Rankings');
    XLSX.writeFile(wb, `XanaLife_All_Modules_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('Export ready — file downloaded.','success');
  }

  function fmt(d){ return d.toISOString().split('T')[0]; }

  function applyQuickRange(type){
    document.querySelectorAll('.range-chip').forEach(c => c.classList.toggle('active', c.dataset.range === type));
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    
    if(type === 'today'){
      startInput.value = todayStr;
      endInput.value = todayStr;
    }
    else if(type === '7d'){
      const s = new Date(today);
      s.setDate(s.getDate() - 6);
      startInput.value = fmt(s);
      endInput.value = todayStr;
    }
    else if(type === 'month'){
      startInput.value = getMonthStart();
      endInput.value = getMonthEnd();
    }
    else if(type === 'all'){
      startInput.value = '';
      endInput.value = '';
    }
    document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('active'));
    const chip = document.querySelector(`.range-chip[data-range="${type}"]`);
    if(chip) chip.classList.add('active');
    updateDashboard(currentView);
  }

  async function updateDashboard(view){
    view = view || currentView;
    await loadData(false);
    const rows = getFilteredData();
    if(!rows || !rows.length){
      dynamicPanel.innerHTML = `<div class="card-modern fade-in"><div class="card-body text-center text-muted py-5"><i class="bi bi-inbox display-4 d-block mb-3"></i>No data matches your filters<div class="mt-2"><button class="icon-btn" id="clearFiltersInline"><i class="bi bi-x-circle"></i>Clear filters</button></div></div></div>`;
      const btn = document.getElementById('clearFiltersInline'); if(btn) btn.addEventListener('click', () => applyQuickRange('all'));
      totalSalesEl.textContent = '0'; customersEl.textContent = '0'; basketEl.textContent = '0.00'; avgAchievementEl.textContent = '0%';
      branchKpiRow.innerHTML = ''; filterIndicator.textContent = 'No data';
      return;
    }
    updateBranchFilter(rows);
    filteredRows = rows;
    if(chartMain){ chartMain.destroy(); chartMain = null; }
    switch(view){
      case 'overview': pageTitle.innerHTML = '<i class="bi bi-grid-1x2-fill me-2" style="color:var(--accent);"></i>Overview'; renderOverview(rows); break;
      case 'targets': pageTitle.innerHTML = '<i class="bi bi-bullseye me-2" style="color:var(--accent);"></i>Targets'; renderTargets(rows); break;
      case 'mom': pageTitle.innerHTML = '<i class="bi bi-arrow-up-right-circle me-2" style="color:var(--accent);"></i>Month on Month'; renderMoM(rows); break;
      case 'wow': pageTitle.innerHTML = '<i class="bi bi-calendar-week me-2" style="color:var(--accent);"></i>Week on Week'; renderWoW(rows); break;
      case 'ranking': pageTitle.innerHTML = '<i class="bi bi-trophy me-2" style="color:var(--accent);"></i>Top / Bottom'; renderRanking(rows); break;
      default: renderOverview(rows);
    }
    setStatus('success', `${rows.length} rows · LIVE data`);
  }

  document.addEventListener('DOMContentLoaded', function(){
    startInput.value = getMonthStart();
    endInput.value = getMonthEnd();
    
    document.querySelectorAll('.nav-item[data-view]').forEach(el => {
      el.addEventListener('click', function(){
        const view = this.dataset.view;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        this.classList.add('active');
        currentView = view;
        updateDashboard(view);
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      });
    });
    document.querySelectorAll('.range-chip').forEach(chip => chip.addEventListener('click', () => applyQuickRange(chip.dataset.range)));
    document.getElementById('sidebarToggle').addEventListener('click', function(){ sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
    overlay.addEventListener('click', function(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); });
    document.getElementById('searchBtn').addEventListener('click', () => { document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('active')); updateDashboard(currentView); });
    document.getElementById('resetFiltersBtn').addEventListener('click', () => { branchSelect.value = ''; applyQuickRange('month'); });
    branchSelect.addEventListener('change', () => updateDashboard(currentView));
    startInput.addEventListener('change', () => { document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('active')); updateDashboard(currentView); });
    endInput.addEventListener('change', () => { document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('active')); updateDashboard(currentView); });
    exportBtn.addEventListener('click', exportAllToExcel);
    refreshBtn.addEventListener('click', function(){ cachedData = null; updateDashboard(currentView); showToast('Refreshing data…'); });
    updateDashboard('overview');
  });
})();
</script>
</body>
</html>
